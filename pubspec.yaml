name: posts_manager
description: "A simple app to manage posts using JSONPlaceholder API"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  fluttertoast: ^8.2.5      # Beautiful toast messages
  shimmer: ^3.0.0            # Loading shimmer effect

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true